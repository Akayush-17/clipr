# Next.js on Netlify — publish MUST be `.next` (not `out`, `public`, or `.`)
# See: https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/
[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
